apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server
  namespace: erp-web-segura
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-server
  template:
    metadata:
      labels:
        app: auth-server
    spec:
      containers:
        - name: auth-server
          image: erp-auth-server:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: erp-config
            - secretRef:
                name: erp-secret
          ports:
            - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: auth-server
  namespace: erp-web-segura
spec:
  selector:
    app: auth-server
  ports:
    - port: 9000
      targetPort: 9000
